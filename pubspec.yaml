name: industrial_service_reports
description: Offline-first industrial technical service reporting app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.31
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  fl_chart: ^1.0.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1
  image_picker: ^1.0.0
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0
  signature: ^5.0.0
  permission_handler: ^12.0.1
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - lib/img/
